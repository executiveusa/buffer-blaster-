name: Test API and Frontend

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api-tests:
    name: Python API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install API dependencies
        run: python -m pip install -r api/requirements.txt
      - name: Run Python tests
        run: python -m pytest tests -q

  frontend-build:
    name: Frontend security, lint, build, and route smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Block high-severity dependency vulnerabilities
        run: npm audit --audit-level=high
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npm run build
      - name: Smoke creator discovery route
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: |
          npm run start -- -p 3000 > /tmp/creator-studio-next.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/create >/dev/null; then
              break
            fi
            sleep 1
          done
          RESPONSE=$(curl -fsS -X POST http://127.0.0.1:3000/v1/discover \
            -H 'Content-Type: application/json' \
            --data '{"intent":"cinematic launch reel for my clothing brand","limit":3}')
          echo "$RESPONSE" | grep -q '"count":3'
          echo "$RESPONSE" | grep -q 'bb-video-launch-reel-001'
