name: Test API and Frontend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-tests:
    name: Python API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install API dependencies
        run: python -m pip install -r api/requirements.txt
      - name: Run creator discovery tests
        run: python -m pytest tests/discovery -q --tb=short
      - name: Run legacy Python tests file-by-file
        shell: bash
        run: |
          set -o pipefail
          : > failed-test.txt
          while IFS= read -r file; do
            echo "Testing $file"
            if ! python -m pytest "$file" -q --tb=short; then
              echo "$file" > failed-test.txt
              exit 1
            fi
          done < <(find tests -type f -name 'test_*.py' ! -path 'tests/discovery/*' | sort)
      - name: Upload legacy test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-test-diagnostic
          path: failed-test.txt
          if-no-files-found: ignore

  frontend-build:
    name: Frontend lint and production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npm run build
