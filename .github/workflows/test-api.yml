name: Test API and Frontend

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api-tests:
    name: Python API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install API dependencies
        run: python -m pip install -r api/requirements.txt
      - name: Run creator discovery tests
        run: python -m pytest tests/discovery -q --tb=short
      - name: Run client isolation diagnostic
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/clients/test_client_isolation.py -vv --tb=short 2>&1 | tee legacy-test-output.txt
      - name: Upload legacy test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-test-diagnostic
          path: legacy-test-output.txt
          if-no-files-found: ignore
      - name: Run remaining legacy Python tests
        run: python -m pytest tests --ignore=tests/discovery --ignore=tests/clients/test_client_isolation.py -q --tb=short

  frontend-build:
    name: Frontend lint and production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        env:
          NEXT_PUBLIC_DEMO_MODE: "true"
        run: npm run build
