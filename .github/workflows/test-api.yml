# Runs the Python parity + API tests on all platforms. These verify the
# pure-Python core fallback (and the Rust lib if the prebuilt artifact is
# downloaded into rust_core/native). No C toolchain required on the runner.

name: test-api

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r api/requirements.txt
      - run: python -m pytest tests -v
