name: bootstrap-import

on:
  push:
    branches: [main]
    paths:
      - ".bootstrap/READY"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore uploaded monorepo
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-* | base64 --decode > /tmp/buffer-blaster.tar.gz
          tar -xzf /tmp/buffer-blaster.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-import.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: import production monorepo and project graph"
          git push origin HEAD:main
